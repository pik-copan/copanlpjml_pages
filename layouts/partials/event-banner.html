<!-- Side Event Banner - Only show on exact root page -->
{{ if and .IsHome (eq .RelPermalink "/") }}
<div class="event-banner-side" id="eventBanner">
  <img src="/images/InSEEDS-logo_nospace.svg" alt="InSEEDS - Click to learn more" class="event-logo-side">
  <button class="event-banner-side-close" onclick="closeEventBanner()" aria-label="Close banner">
    ×
  </button>
</div>

<style>
.event-banner-side {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: linear-gradient(135deg, #F5F0E8 0%, #EDE7DC 100%);
  border-radius: 16px;
  padding: 16px 20px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all 0.3s ease;
  cursor: pointer;
  text-decoration: none;
  max-width: 380px;
}

.event-banner-side:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
}

.event-banner-side-content {
  display: flex;
  align-items: center;
  gap: 14px;
  flex: 1;
}

.event-logo-side {
  height: 250px;
  width: auto;
  flex-shrink: 0;
}

.event-banner-side-text {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.event-banner-side-title {
  color: #344643;
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
}

.event-banner-side-close {
  background: rgba(227, 114, 34, 0.15);
  border: none;
  color: #e37222;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  padding: 0;
  flex-shrink: 0;
  font-weight: 300;
}

.event-banner-side-close:hover {
  background: rgba(227, 114, 34, 0.25);
  transform: scale(1.1);
}

/* Make banner clickable to navigate to InSEEDS page */
.event-banner-side {
  text-decoration: none !important;
}

/* Mobile responsive */
@media (max-width: 768px) {
  .event-banner-side {
    bottom: 20px;
    right: 20px;
    padding: 14px 18px;
    max-width: 280px;
  }
  
  .event-logo-side {
    height: 90px;
  }
  
  .event-banner-side-title {
    font-size: 14px;
  }
  
  .event-banner-side-close {
    width: 26px;
    height: 26px;
    font-size: 18px;
  }
}

/* Tablet responsive */
@media (max-width: 1024px) and (min-width: 769px) {
  .event-banner-side {
    max-width: 340px;
  }
  
  .event-logo-side {
    height: 110px;
  }
}
</style>

<script>
function closeEventBanner() {
  event.stopPropagation();
  const banner = document.getElementById('eventBanner');
  banner.style.transform = 'translateY(150%)';
  banner.style.opacity = '0';
  
  setTimeout(() => {
    banner.style.display = 'none';
  }, 300);
}

// Make banner clickable to navigate to InSEEDS page
document.addEventListener('DOMContentLoaded', function() {
  const banner = document.getElementById('eventBanner');
  if (banner) {
    banner.addEventListener('click', function(e) {
      if (!e.target.classList.contains('event-banner-side-close')) {
        window.location.href = '/inseeds/';
      }
    });
  }
});
</script>
{{ end }}
